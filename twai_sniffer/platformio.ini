; PlatformIO Project Configuration — twai_sniffer
; ESP32 built-in TWAI (CAN) controller, no external chip needed.
;
; Build:  pio run
; Upload: pio run -t upload
; Monitor: pio device monitor


[env:twai_sniffer]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
