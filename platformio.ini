; PlatformIO Project Configuration — ESP32 CAN Bus Test Suite
; Three independent sketches for testing CAN communication with motor controller
;
; Build specific:   pio run -e baud_scanner
; Upload specific:  pio run -e mcp2515_sniffer -t upload
; Monitor:          pio device monitor -e twai_sniffer
;
; Or use default (baud_scanner) with: pio run

[platformio]
default_envs = mcp2515_sniffer
src_dir = .

[env]
upload_port = COM5
monitor_port = COM5

; ============================================================================
; Environment 1: baud_scanner
; Auto-scans unknown CAN bus baud rates
; ============================================================================
[env:baud_scanner]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
build_src_filter = +<baud_scanner/src/*> -<.git/> -<.svn/>

; ============================================================================
; Environment 2: mcp2515_sniffer
; External MCP2515 SPI CAN module sniffer
; ============================================================================
[env:mcp2515_sniffer]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
lib_deps        = autowp/autowp-mcp2515 @ ^1.0.1
build_src_filter = +<mcp2515_sniffer/src/*> -<.git/> -<.svn/>

; ============================================================================
; Environment 3: twai_sniffer
; ESP32 built-in TWAI (CAN) controller, no external chip needed
; ============================================================================
[env:twai_sniffer]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
build_src_filter = +<twai_sniffer/src/*> -<.git/> -<.svn/>

; ============================================================================
; Environment 4: mock_motor
; Simulates a motor controller sending fake RPM, temperature, voltage data
; ============================================================================
[env:mock_motor]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
lib_deps        = autowp/autowp-mcp2515 @ ^1.0.1
build_src_filter = +<mock_motor/src/*> -<.git/> -<.svn/>

