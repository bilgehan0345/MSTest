; PlatformIO Project Configuration — mcp2515_sniffer
; External MCP2515 SPI CAN module sniffer.
; Library is fetched automatically on first build.
;
; Build:  pio run
; Upload: pio run -t upload
; Monitor: pio device monitor


[env:mcp2515_sniffer]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
lib_deps      = autowp/autowp-mcp2515 @ ^1.0.1
